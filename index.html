<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载测试</title>
</head>
<body>
<h1>下载测试</h1>
<p>何董</p>
<button>下载</button>
<script>
    document.querySelector('button').addEventListener('click', function() {
        const a = document.createElement('a');
        a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent('下载测试文件内容\n作者 COAELS');
        a.download = 'download_test.txt';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    });
</script>
</body>
</html>
