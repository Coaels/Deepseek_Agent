name: 问题反馈 / Bug Report
description: 提交问题反馈，请严格按照模板填写
title: "[问题]: "
labels: ["bug", "待处理"]
assignees: []
body:
  # === 勾选部分 (必选) ===
  - type: markdown
    attributes:
      value: |
        ##  请先阅读并勾选以下承诺

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前承诺 (必须全部勾选)
      description: 请确保您已阅读并同意以下所有条款
      options:
        - label: 请确保您反馈的问题**没有**被其他人反馈过
          required: true
        - label: 请确保您使用的是**官方版本**的提示词，没有修改代码
          required: true
        - label: 请确保您使用的是最新**测试**版本，而不是其他版本
          required: true
        - label: 请确保您使用的是官方skill，第三方skill请去**Skill反馈**提交issue
          required: true
        - label: 如果您勾选了这个选项，那么您的issue会直接被关闭
          required: true
        - label: 请确保您会完整的填写所有必填项，否则issue会被直接关闭
          required: true

  # === 填空部分 (必填) ===
  - type: markdown
    attributes:
      value: |
        ---
        ##  必填信息

  - type: input
    id: version
    attributes:
      label: 您使用的版本
      description: 请填写您当前使用的具体版本号
      placeholder: 例如：v2.1.3
    validations:
      required: true

  - type: input
    id: repo_name
    attributes:
      label: 请填写本仓库的全名
      description: 不区分大小写，请填写仓库的完整名称
      placeholder: 例如：owner/repository-name
    validations:
      required: true

  - type: textarea
    id: problem_description
    attributes:
      label: 请详细描述您的问题
      description: 请清晰、完整地描述您遇到的问题
      placeholder: 请在这里详细描述问题...
    validations:
      required: true

  - type: textarea
    id: reproduction_steps
    attributes:
      label: 请复述如何呈现此问题
      description: 提供完整的复现步骤，帮助开发者定位问题
      placeholder: |
        1. 打开...
        2. 点击...
        3. 看到错误...
    validations:
      required: true

  - type: textarea
    id: expected_result
    attributes:
      label: 请描述您希望的解决结果
      description: 您期望的正确行为是什么？
      placeholder: 我希望程序能...
    validations:
      required: true

  # === 图片附件 (必填) ===
  - type: markdown
    attributes:
      value: |
        ---
        ##  附件要求 (必填)

  - type: textarea
    id: screenshot
    attributes:
      label: 请附上聊天截图，展开所有网络搜索内容（如有）
      description: 请拖拽或粘贴您的截图。如果有网络搜索内容，请确保展开后截图。重要信息请打码处理。
      placeholder: 请将图片拖拽到此区域，或点击上传
    validations:
      required: true

  - type: textarea
    id: console_log
    attributes:
      label: 请附上控制台全部消息
      description: 请复制完整的控制台日志输出，不要截断
      render: shell
      placeholder: |
        请将控制台完整日志粘贴在此处...
    validations:
      required: true

  # === 选填部分 ===
  - type: markdown
    attributes:
      value: |
        ---
        ##  选填信息

  - type: input
    id: cache_files
    attributes:
      label: 请发送 /ai/workspace/.web_cache 下的所有文件
      description: 如果方便，请将 web_cache 目录下的所有文件打包上传
      placeholder: 可拖拽上传文件或提供下载链接
    validations:
      required: false
